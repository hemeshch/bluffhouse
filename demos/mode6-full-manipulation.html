<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bluffhouse replay</title>
<style>
  /* clean, flat, product-grade — dark charcoal chrome, one signature
     green, the table as a flat hero. chess.com energy, poker content. */
  :root {
    --bg:        #262421;
    --bg-deep:   #211F1C;
    --panel:     #302E2B;
    --panel-2:   #2A2825;
    --hover:     #3B3936;
    --border:    #3E3C39;
    --border-2:  #4C4A46;
    --text:      #EDEBE9;
    --muted:     #A29F9B;
    --faint:     #7C7975;
    --green:     #81B64C;
    --green-d:   #45753C;
    --green-soft: rgba(129, 182, 76, .15);
    --felt:      #47703A;
    --felt-edge: #3A5C30;
    --red:       #E2554F;
    --red-soft:  rgba(226, 85, 79, .14);
    --pip-red:   #C43C35;
    --pip-black: #24221F;
    --sans: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
  }
  button { font-family: inherit; }
  :focus-visible { outline: 2px solid var(--green); outline-offset: 2px; border-radius: 6px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--hover); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ── header ─────────────────────────── */
  header {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 10px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .wordmark { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
  .wordmark .tag {
    font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    background: var(--green); color: #fff;
    padding: 2px 7px; border-radius: 5px; margin-left: 7px; vertical-align: 2px;
  }
  .meta { font-size: 12px; color: var(--muted); font-weight: 500; }
  nav.persp { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
  nav.persp button {
    font-size: 12.5px; font-weight: 600; color: var(--muted); cursor: pointer;
    padding: 6px 13px; border-radius: 7px;
    border: none; background: transparent;
    transition: background .1s, color .1s;
  }
  nav.persp button:hover { background: var(--hover); color: var(--text); }
  nav.persp button.on { background: var(--green); color: #fff; }
  nav.persp .eye { font-size: 9px; font-weight: 700; letter-spacing: .08em; margin-right: 6px; opacity: .75; }

  /* ── layout ─────────────────────────── */
  main { flex: 1; display: grid; grid-template-columns: 200px 1fr 340px; min-height: 0; gap: 0; }
  @media (max-width: 1020px) { main { grid-template-columns: 1fr; overflow: auto; } aside { max-height: 230px; } }

  /* ── hands rail ─────────────────────── */
  aside#hands { background: var(--panel-2); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 10px; }
  .side-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    color: var(--faint); padding: 2px 10px 8px;
  }
  .hand-item {
    width: 100%; text-align: left; cursor: pointer;
    border: none; border-left: 3px solid transparent;
    background: none; border-radius: 6px;
    padding: 7px 10px; margin-bottom: 1px;
    display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
    color: var(--muted);
  }
  .hand-item:hover { background: var(--hover); color: var(--text); }
  .hand-item.on { background: var(--green-soft); border-left-color: var(--green); color: var(--text); }
  .hand-item .no { font-weight: 700; font-size: 13px; }
  .hand-item .win { font-family: var(--mono); font-size: 10.5px; color: var(--green); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .final { margin-top: 14px; padding: 12px 0 4px; border-top: 1px solid var(--border); }
  .final .row { display: flex; justify-content: space-between; padding: 3px 10px; font-size: 12.5px; color: var(--muted); }
  .final .row b { font-family: var(--mono); font-weight: 600; color: var(--text); }

  /* ── stage ──────────────────────────── */
  section#stage { display: flex; flex-direction: column; min-width: 0; padding: 20px 24px 14px; gap: 12px; overflow-y: auto; }
  #table-wrap { display: flex; justify-content: center; }
  #table {
    position: relative;
    width: min(100%, 760px);
    aspect-ratio: 16 / 9.4;
    border-radius: 200px;
    background: var(--felt);
    border: 6px solid var(--felt-edge);
    box-shadow: 0 4px 16px rgba(0, 0, 0, .35);
  }
  #table::before { /* betting line */
    content: ""; position: absolute; inset: 12% 10%;
    border: 2px solid rgba(255, 255, 255, .12);
    border-radius: 160px;
    pointer-events: none;
  }
  #center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-53%);
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    z-index: 1;
  }
  #street { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.55); }
  #board { display: flex; gap: 6px; min-height: 62px; }
  #pot { display: flex; align-items: baseline; gap: 8px; }
  #pot .lbl { font-size: 10px; font-weight: 700; letter-spacing: .12em; color: rgba(255,255,255,.6); }
  #pot b { font-size: 24px; font-weight: 800; color: #fff; letter-spacing: -0.01em; }

  /* ── cards ──────────────────────────── */
  .card {
    width: 42px; height: 60px; border-radius: 5px;
    background: #fff;
    border: 1px solid rgba(0, 0, 0, .25);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 2px 4px rgba(0, 0, 0, .3);
  }
  .card b { font-size: 18px; font-weight: 800; line-height: 1; }
  .card i { font-style: normal; font-size: 15px; line-height: 1.1; }
  .card.sh, .card.sd { color: var(--pip-red); }
  .card.ss, .card.sc { color: var(--pip-black); }
  .card.back {
    background: var(--green);
    border-color: var(--green-d);
    position: relative;
  }
  .card.back::after {
    content: ""; position: absolute; inset: 4px;
    border: 2px solid rgba(255, 255, 255, .5); border-radius: 3px;
  }
  .card.slot { background: rgba(0, 0, 0, .16); border: 1.5px dashed rgba(255, 255, 255, .25); box-shadow: none; }
  .seat .card { width: 30px; height: 42px; border-radius: 4px; }
  .seat .card b { font-size: 13px; }
  .seat .card i { font-size: 11px; }

  /* ── seats: player cards ────────────── */
  .seat {
    position: absolute; transform: translate(-50%,-50%);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: opacity .15s; z-index: 2;
  }
  .seat.folded { opacity: .4; }
  .plaque {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px 7px 8px;
    min-width: 118px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 3px 10px rgba(0, 0, 0, .4);
    transition: border-color .12s, box-shadow .12s;
  }
  .seat.actor .plaque { border-color: var(--green); box-shadow: 0 0 0 2px var(--green-soft), 0 3px 10px rgba(0,0,0,.4); }
  .seat.winner .plaque { border-color: var(--green); background: var(--green-soft); }
  .ava {
    width: 30px; height: 30px; border-radius: 6px; flex-shrink: 0;
    background: var(--hover); color: var(--text);
    font-size: 14px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .seat.actor .ava { background: var(--green); color: #fff; }
  .pinfo { min-width: 0; text-align: left; }
  .pinfo .who { font-size: 13px; font-weight: 700; line-height: 1.2; white-space: nowrap; }
  .pinfo .stack { font-family: var(--mono); font-size: 12px; color: var(--muted); line-height: 1.3; }
  .pinfo .tag { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--red); }
  .pinfo .tag.quiet { color: var(--faint); }
  .pinfo .social { font-size: 10px; font-weight: 600; margin-top: 1px; }
  .pinfo .social .s { color: var(--red); }
  .dealer {
    position: absolute; top: -7px; right: -7px;
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; color: #262421;
    font-size: 10px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 3px rgba(0, 0, 0, .4);
  }
  .hole { display: flex; gap: 4px; min-height: 42px; }

  /* bets as chips */
  .wager { display: flex; align-items: center; gap: 6px; min-height: 21px; }
  .stack-o-chips { display: flex; flex-direction: column-reverse; }
  .chip {
    width: 18px; height: 18px; border-radius: 50%;
    border: 3px dashed rgba(255, 255, 255, .9);
    background: var(--pip-red);
    box-shadow: 0 1px 0 rgba(0, 0, 0, .4);
    margin-top: -12px;
  }
  .chip:first-child { margin-top: 0; }
  .chip.blue { background: #3B6EA5; }
  .chip.dark { background: #24221F; border-color: rgba(129, 182, 76, .9); }
  .wager .amt { font-family: var(--mono); font-size: 11px; font-weight: 600; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.6); }

  /* table-talk bubbles */
  .bubble {
    position: absolute; transform: translate(-50%,-50%);
    max-width: 215px; z-index: 3;
    background: #fff; color: #262421;
    border-radius: 10px; padding: 7px 12px 8px;
    font-size: 12.5px; line-height: 1.35;
    box-shadow: 0 6px 18px rgba(0, 0, 0, .4);
  }
  .bubble .from { font-size: 9px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--green-d); display: block; margin-bottom: 1px; }
  .bubble.hush { background: var(--panel); color: var(--text); border: 1.5px dashed var(--border-2); }
  .bubble.hush .from { color: var(--green); }
  .bubble.sign { background: var(--panel); color: var(--text); border: 1px solid var(--green-d); font-style: italic; }
  .bubble.sign .from { color: var(--green); }
  .bubble.callout { background: #3A2422; color: var(--text); border: 1.5px solid var(--red); }
  .bubble.callout .from { color: var(--red); }
  .bubble.note { font-style: italic; }
  .bubble .conf { font-family: var(--mono); font-style: normal; font-size: 9px; color: var(--faint); margin-left: 6px; }

  /* ── transport ──────────────────────── */
  #transport {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 9px 14px;
  }
  #transport button {
    font-size: 13px; font-weight: 700; cursor: pointer; color: var(--text);
    border: none; background: var(--hover);
    border-radius: 8px; padding: 8px 14px;
    transition: background .1s, transform .05s;
  }
  #transport button:hover { background: var(--border-2); }
  #transport button:active { transform: translateY(1px); }
  #transport button.play {
    background: var(--green); color: #fff; min-width: 52px;
    box-shadow: 0 4px 0 var(--green-d);
  }
  #transport button.play:hover { filter: brightness(1.06); }
  #transport button.play:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--green-d); }
  #transport input[type=range] { flex: 1; accent-color: var(--green); }
  #counter { font-family: var(--mono); font-size: 11px; color: var(--faint); min-width: 66px; text-align: right; }
  #speed {
    font-size: 12px; font-weight: 600; border: none; border-radius: 8px;
    padding: 7px 8px; background: var(--hover); color: var(--muted); cursor: pointer;
  }

  /* caption bar */
  #caption {
    min-height: 46px;
    border-left: 4px solid var(--green);
    background: var(--panel);
    border-radius: 8px;
    padding: 7px 14px 8px;
    font-size: 14px;
  }
  #caption.dim { color: var(--faint); font-style: italic; }
  #caption .k { display: block; font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--green); margin-bottom: 1px; }

  /* ── feed ───────────────────────────── */
  aside#feed-panel { background: var(--panel-2); border-left: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
  .feed-head {
    padding: 13px 16px 10px;
    font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    color: var(--faint); border-bottom: 1px solid var(--border);
  }
  .feed-head b { color: var(--green); }
  #feed { flex: 1; overflow-y: auto; padding: 10px 12px 18px; }
  .line { font-size: 13px; color: var(--muted); padding: 5px 10px; border-radius: 6px; margin-bottom: 1px; border-left: 3px solid transparent; }
  .line.last { background: var(--green-soft); border-left-color: var(--green); color: var(--text); }
  .line.env { font-family: var(--mono); font-size: 10.5px; color: var(--faint); }
  .line.msg {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-left: 3px solid var(--border);
    border-radius: 8px; padding: 7px 12px; margin: 5px 0;
  }
  .line.msg.last { border-color: var(--green); border-left-color: var(--green); background: var(--green-soft); }
  .line.msg.hush { border-style: dashed; }
  .line.msg.sign { font-style: italic; }
  .line.msg.callout { border-color: var(--red); border-left-color: var(--red); background: var(--red-soft); }
  .line.msg.note { font-style: italic; border-style: dotted; }
  .line .conf { font-family: var(--mono); font-size: 10px; color: var(--faint); margin-left: 6px; }
  .line.recept {
    font-family: var(--mono); font-size: 10px; color: var(--faint);
    padding: 0 12px 6px 22px; margin-top: -3px;
  }
  .line.recept b { color: var(--green); font-weight: 600; }
  .line.intent {
    font-style: italic; font-size: 11.5px; color: var(--green);
    padding: 0 12px 6px 22px; margin-top: -3px; opacity: .85;
  }
  .line.reasoning {
    font-style: italic; font-size: 12.5px;
    border-left: 3px solid var(--green); color: var(--muted);
    padding: 6px 12px; margin: 4px 0 8px 10px;
  }
  .line.reasoning .who { font-style: normal; font-size: 9px; font-weight: 700; color: var(--green); letter-spacing: .09em; text-transform: uppercase; display: block; margin-bottom: 2px; }

  #empty { margin: auto; text-align: center; color: var(--faint); font-size: 17px; font-weight: 600; padding: 60px; }
  #empty code { font-family: var(--mono); font-size: 13px; color: var(--green); }
</style>
</head>

    for (const c of calls) {
      if ((c.phase || "action") !== "action") continue;
      if (!groups.has(c.decision_id)) groups.set(c.decision_id, []);
      groups.get(c.decision_id).push(c);
    }
    [...groups.keys()].sort((a, b) => a - b).forEach((d, k) => {
      if (k >= actions.length) return;
      const grp = groups.get(d);
      const ok = grp.filter((c) => !c.parse_error).at(-1);
      let text = null;
      if (ok) { const j = looseJson(ok.response_text); if (j && j.reasoning) text = String(j.reasoning); }

  // ── state reduction ────────────────────────────────────────────
  function reduce(events, upto) {

            el.insertAdjacentHTML("beforeend", `<span class="conf">~${Math.round(o.confidence * 100)}% sure</span>`);
          }
        }
      }
      if (el) { if (i === cursor) el.classList.add("last"); feed.appendChild(el); }
      if (perspective === "truth" && ev.type === "message_sent") {
        if (ev.intent && ev.intent !== ev.text) feed.appendChild(line(`meant: ${ev.intent}`, "intent"));
        const summary = receptionSummary(ev);
        if (summary) {
          const rl = line("", "recept");
          rl.innerHTML = summary;
          feed.appendChild(rl);
        }
      }
      const r = reasoning[ev.event_id];
      if (r && (perspective === "truth" || perspective === r.agent)) {
        const rl = line(r.text || "(model reply unusable — safe action substituted)", "reasoning");
        rl.insertAdjacentHTML("afterbegin",
          `<span class="who">${esc(r.agent)} was thinking${r.fault ? " · after a malformed reply" : ""}</span>`);
        feed.appendChild(rl);
      }
    }
    feed.scrollTop = feed.scrollHeight;
  }

  function receptionSummary(e) {
    const entries = Object.entries(e.receptions || {}).filter(([a]) => a !== e.sender);
    if (!entries.length || e.modality === "speech") return null;
    const label = (r) =>
      r.outcome === "clear" ? "received"
      : r.outcome === "fragment" ? `fragment ~${Math.round(r.confidence * 100)}%`
      : r.outcome === "surface" ? `noticed ~${Math.round(r.confidence * 100)}%`
      : "missed";
    return entries.map(([a, r]) => `<b>${esc(a)}</b> ${label(r)}`).join(" · ");
  }

  function chipStack(amount) {
    const bb = run.big_blind || 1;
    const count = amount <= bb ? 1 : amount <= 4 * bb ? 2 : amount <= 12 * bb ? 3 : 4;
    const color = amount <= 2 * bb ? "" : amount <= 10 * bb ? " blue" : " dark";
    const stack = document.createElement("div");
    stack.className = "stack-o-chips";
    for (let i = 0; i < count; i++) {
      const c = document.createElement("div");
      c.className = "chip" + color;
      stack.appendChild(c);
    }
    return stack;
  }

  function line(text, cls) {
    const d = document.createElement("div");
    d.className = `line ${cls}`;
    d.appendChild(document.createTextNode(text));
    return d;
  }

  function cardEl(code, back = false, slot = false) {
    const d = document.createElement("div");
    d.className = "card";
    if (slot) { d.classList.add("slot"); return d; }
    if (back || !code) { d.classList.add("back"); return d; }
    d.classList.add("s" + code[1]);
    d.innerHTML = `<b>${code[0] === "T" ? "10" : code[0]}</b><i>${SUIT[code[1]]}</i>`;
    return d;
  }

  function truthText(e) {
    const desc = (a) => (a.action === "raise_to" ? `raise_to ${a.amount}` : a.action);
    switch (e.type) {
      case "hand_started": return `Hand ${e.hand_no} begins. Button: ${e.button}. Stacks: ${e.seat_order.map((a) => `${a} ${e.stacks[a]}`).join(", ")}.`;
      case "blind_posted": return `${e.agent_id} posts the ${e.blind} blind (${e.amount}).`;
      case "hole_cards_dealt": return `${e.agent_id} is dealt ${e.cards.join(" ")}.`;
      case "action_taken": {
        const allin = e.all_in ? " — all in" : "";
        if (e.action === "fold") return `${e.agent_id} folds.`;
        if (e.action === "check") return `${e.agent_id} checks.`;
        if (e.action === "call") return `${e.agent_id} calls ${e.amount}${allin}.`;
        return `${e.agent_id} raises to ${e.amount}${allin}.`;
      }
      case "action_repaired": return `⚙ ${e.agent_id} submitted '${desc(e.submitted)}' — illegal, applied as '${desc(e.applied)}' (${e.reason}).`;
      case "message_sent":
        if (e.modality === "speech") return `${e.sender} says: "${e.text}"`;
        if (e.modality === "whisper") return `${e.sender} whispers to ${e.targets.join(", ")}: "${e.text}"`;
        if (e.modality === "note") return `${e.sender} slips a note to ${e.targets.join(", ")}: "${e.text}"`;
        if (e.modality === "accusation") return `${e.sender} accuses ${e.targets.join(", ")}: "${e.text}"`;
        return `${e.sender} signals ${e.targets.join(", ")}: "${e.text}"`;
      case "ledger_updated":
        return `⚖ ${e.agent_id} draws heat: suspicion ${e.suspicion.toFixed(2)} (+${e.delta_suspicion.toFixed(2)}) — ${e.reason}.`;
      case "message_rejected": return `⚙ ${e.sender}'s message was dropped: ${e.reason}.`;
      case "attention_committed": {
        const watch = Object.entries(e.watch || {}).map(([a, w]) => `${a} ${w.toFixed(2)}`).join(", ");
        return `${e.agent_id} commits attention — ${watch ? "watching " + watch + "; " : ""}table ${e.table.toFixed(2)}.`;
      }
      case "board_dealt": return `${e.street[0].toUpperCase()}${e.street.slice(1)}: ${e.cards.join(" ")}. Board: ${e.board.join(" ")}.`;
      case "showdown_reveal": return `${e.agent_id} shows ${e.cards.join(" ")}.`;
      case "pot_awarded": return `${e.agent_id} collects ${e.amount}.`;
      case "hand_ended": return `Hand ${e.hand_no} ends. Stacks: ${Object.entries(e.stacks).map(([a, v]) => `${a} ${v}`).join(", ")}.`;
      default: return e.type;
    }
  }

  function looseJson(text) {
    const i = text.indexOf("{"), j = text.lastIndexOf("}");
    if (i < 0 || j <= i) return null;
    try { return JSON.parse(text.slice(i, j + 1)); } catch { return null; }
  }

  function esc(t) {
    const d = document.createElement("span");
    d.textContent = String(t);
    return d.innerHTML;
  }

  render();
}
</script>
</body>
</html>
